<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buckshot Tracker</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="Calculate precise shotgun shell probabilities in real-time. Includes full game state tracking, burner phone countdowns, action log, and instant undo/redo capabilities.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://buckshottracker.online/">
    <meta property="og:title" content="Buckshot Tracker">
    <meta property="og:description" content="Calculate precise shotgun shell probabilities in real-time. Includes full game state tracking, burner phone countdowns, action log, and instant undo/redo capabilities.">
    <meta property="og:image" content="https://buckshottracker.online/og-image.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://buckshottracker.online/">
    <meta name="twitter:title" content="Buckshot Tracker">
    <meta name="twitter:description" content="Calculate precise shotgun shell probabilities in real-time. Includes full game state tracking, burner phone countdowns, action log, and instant undo/redo capabilities.">
    <meta name="twitter:image" content="https://buckshottracker.online/og-image.png">

    <style>
        body {
            background-color: #121212;
            color: white;
            text-align: center;
            font-family: sans-serif;
            margin-top: 50px;
        }

        .input-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            margin-right: 15px;
        }

        .log-box {
            background-color: #1e1e1e;
            width: 80%;
            max-width: 400px;
            height: 200px;
            margin: 0 auto;
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
            text-align: left;
            border: 2px solid #333;
            margin-top: 25px;
            color: #555555;
        }

        .log-box p {
            font-size: 14px;
            margin-top: 0px;
        }

        input {
            width: 50px;
            padding: 7px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            text-align: center;
            background-color: #333;
            color: white;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }


        button {
            padding: 15px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            color: white;
            width: 140px;
        }

        #fire-live {
            background-color: #121212;
            border: 2px solid #d32f2f;
            color: #d32f2f;
        }

        #fire-blank {
            background-color: #121212;
            border: 2px solid #1976d2;
            color: #1976d2;
        }

        #reverse {
            background-color: #121212;
            border: 2px solid #1fd219;
            color: #1fd219;
        }

        #clear-round {
            background-color: #121212;
            border: 2px solid #555555;
            color: #555555;
        }

        .chance-row {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 20px;
        }

        .live-text {
            color: #ff5252;
            margin: 0;
        }

        .blank-text {
            color: #aaaaaa;
            margin: 0;
        }

        #phone-live,
        #phone-blank {
            background-color: #121212;
            border: 2px solid #d8af2c;
            color: #d8af2c;
        }
        #undo-btn, #redo-btn {
            background-color: #121212;
            border: 2px solid #888888;
            color: #888888;
        }

        .github-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px; 
            color: #888888; 
            text-decoration: none; 
            padding: 8px 15px;
            border: 2px solid #333333;
            border-radius: 8px;
            font-size: 14px;
            background-color: #121212;
            transition: 0.2s ease; 
        }

        .github-btn:hover {
            color: white;
            border-color: white;
        }
        
        @media (max-width: 768px) {
            .github-btn {
                border: none;
                background-color: transparent;
                padding: 5px;
                top: 10px;
                left: 10px;
            }
        }
    </style>
</head>

<body>
    <body>

    <a href="https://github.com/ItsIsaiah0/buckshot-tracker" target="_blank" class="github-btn">
        <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path>
        </svg>
    </a>

    <h1>Buckshot Tracker</h1>

    <div class="input-row">
        <div>
            <label>Live Rounds:</label>
            <input type="number" id="live-input">
        </div>
        <div>
            <label>Blank Rounds:</label>
            <input type="number" id="blank-input">
        </div>
    </div>

    <div class="chance-row">
        <div class="chance-row">
            <h2 class="live-text">Live: <span id="live-percent">0%</span></h2>
            <h2 class="blank-text">Blank: <span id="blank-percent">0%</span></h2>
        </div>
    </div>

    <div class="button-row">
        <button id="fire-live">Fired Live</button>
        <button id="fire-blank">Fired Blank</button>
        <button id="reverse">Reverse Polarity</button>
        <button id="clear-round">Clear Round</button>
    </div>

    <div class="input-row" style="margin-top: 20px; margin-bottom: 10px;">
        <div>
            <label style="color: #d8af2c; width: auto;">☎️ Phone - Bullet #:</label>
            <input type="number" id="phone-input">
        </div>
    </div>

    <div class="button-row">
        <button id="phone-live">Hinted Live</button>
        <button id="phone-blank">Hinted Blank</button>
    </div>

    <div class="log-box" id="move-log">
        <p>Game log will appear here...</p>
    </div>
    <div class="button-row">
        <button id="undo-btn">Undo</button>
        <button id="redo-btn">Redo</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
